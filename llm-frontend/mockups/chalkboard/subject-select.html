<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnLikeMagic — Subject Select (Chalkboard)</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
  .ss-greeting {
    font-family: var(--font-hand);
    font-size: var(--fs-2xl);
    color: var(--chalk-white);
    text-align: center;
    margin: var(--sp-2) 0 var(--sp-1);
    text-shadow: 0 0 1px rgba(244,244,239,0.4), 0 2px 0 rgba(0,0,0,0.3);
  }
  .ss-sub {
    text-align: center;
    font-family: var(--font-body);
    font-size: var(--fs-sm);
    color: var(--chalk-white-dim);
    letter-spacing: 0.08em;
    margin-bottom: var(--sp-5);
  }
  .ss-greeting .accent { color: var(--chalk-gold); }

  .subject-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px; height: 42px;
    border-radius: var(--r-sm);
    background: rgba(0,0,0,0.25);
    margin-right: var(--sp-3);
    flex-shrink: 0;
    color: var(--chalk-white);
  }

  .subject-spine {
    display: flex;
    align-items: center;
  }

  .subject-spine-content { flex: 1; }

  .progress-dots {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .progress-dots .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(244,244,239,0.2);
  }
  .progress-dots .dot--done { background: var(--chalk-gold); }

  /* Mini top nav chrome inside the chalkboard */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--sp-5);
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px dashed rgba(244,244,239,0.3);
    background: rgba(244,244,239,0.05);
    color: var(--chalk-white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .small-logo {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-hand);
    font-size: var(--fs-xl);
    color: var(--chalk-white);
  }
</style>
</head>
<body>

<div class="wall">
<div class="viewport">

  <div class="frame">
    <div class="frame-nails"></div>
    <div class="board" style="min-height: 620px;">

      <!-- Doodles -->
      <svg class="doodle doodle--tr" width="50" height="40" viewBox="0 0 120 80" style="opacity:0.16;">
        <path d="M10 40 L50 10 Q 80 5, 100 30 Q 110 55, 90 70 L60 50"
              stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        <polygon points="88,66 92,72 86,74" fill="currentColor"/>
      </svg>
      <svg class="doodle doodle--br" width="36" height="36" viewBox="0 0 64 64" style="opacity:0.16;">
        <g stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round">
          <path d="M20 20 L20 40 M10 30 L30 30"/>
          <path d="M46 46 L46 56 M40 51 L52 51"/>
        </g>
      </svg>

      <!-- Top nav (home / profile icons) -->
      <div class="top-nav">
        <button class="icon-btn" title="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
            <path d="M3 12 L12 4 L21 12 M5 10 L5 20 L10 20 L10 14 L14 14 L14 20 L19 20 L19 10"/>
          </svg>
        </button>
        <div class="small-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M3 6 L12 4 L21 6 L21 18 L12 16 L3 18 Z"/>
            <path d="M12 4 L12 16"/>
          </svg>
          <span>Learn Like Magic</span>
        </div>
        <button class="icon-btn" title="Profile">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="3.5"/>
            <path d="M4 20 Q 4 13, 12 13 Q 20 13, 20 20"/>
          </svg>
        </button>
      </div>

      <!-- Greeting -->
      <h1 class="ss-greeting">Hi <span class="accent">Riya</span>! What should we learn today?</h1>
      <p class="ss-sub">PICK A SUBJECT</p>

      <!-- Subject spines -->
      <button class="subject-spine subject-spine--math">
        <span class="subject-icon">
          <!-- plus symbol = math -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5 L12 19 M5 12 L19 12"/>
          </svg>
        </span>
        <span class="subject-spine-content">
          Mathematics
          <span class="subject-spine-sub">3 CHAPTERS · NEXT: GROUPS OF 10</span>
          <div class="progress-dots">
            <span class="dot dot--done"></span>
            <span class="dot dot--done"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </span>
      </button>

      <button class="subject-spine subject-spine--science">
        <span class="subject-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <!-- atom -->
            <circle cx="12" cy="12" r="2"/>
            <ellipse cx="12" cy="12" rx="10" ry="4"/>
            <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/>
            <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
          </svg>
        </span>
        <span class="subject-spine-content">
          Science
          <span class="subject-spine-sub">5 CHAPTERS · READY TO START</span>
          <div class="progress-dots">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </span>
      </button>

      <button class="subject-spine subject-spine--english">
        <span class="subject-icon">
          <!-- book -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
            <path d="M3 5 L12 3 L21 5 L21 20 L12 18 L3 20 Z"/>
            <path d="M12 3 L12 18"/>
          </svg>
        </span>
        <span class="subject-spine-content">
          English
          <span class="subject-spine-sub">4 CHAPTERS · IN PROGRESS</span>
          <div class="progress-dots">
            <span class="dot dot--done"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </span>
      </button>

      <button class="subject-spine subject-spine--social">
        <span class="subject-icon">
          <!-- globe -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12 L21 12 M12 3 Q 6 12, 12 21 M12 3 Q 18 12, 12 21"/>
          </svg>
        </span>
        <span class="subject-spine-content">
          Social Studies
          <span class="subject-spine-sub">6 CHAPTERS · READY TO START</span>
          <div class="progress-dots">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </span>
      </button>

      <button class="subject-spine subject-spine--hindi">
        <span class="subject-icon">
          <!-- Devanagari ka (stylized) -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4 6 L20 6 M7 6 L7 18 M7 12 L13 12 M13 6 L13 18 M17 10 Q 19 14, 17 18"/>
          </svg>
        </span>
        <span class="subject-spine-content">
          Hindi
          <span class="subject-spine-sub">3 CHAPTERS · NEW</span>
          <div class="progress-dots">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </span>
      </button>

    </div>

    <div class="chalk-tray">
      <span class="chalk chalk--coral"></span>
      <span class="chalk chalk--gold"></span>
      <span class="chalk chalk--pink"></span>
      <span class="chalk chalk--yellow"></span>
      <span class="chalk chalk--mint"></span>
      <span class="chalk chalk--sky"></span>
      <span class="eraser"></span>
    </div>
  </div>

  <p style="text-align:center;font-family:var(--font-body);font-size:var(--fs-xs);color:var(--ink-mute);margin-top:var(--sp-3);">
    Subject select · five subjects with per-subject color & progress
  </p>
</div>
</div>
</body>
</html>
